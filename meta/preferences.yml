---
# Pins the CI platform/version matrix for this role. Without this, ansible-generator
# falls back to default_platforms and silently discards these choices on regenerate.
platforms:
  # Crowd 4.4 needs java_version 11 (see molecule/default/prepare.yml).
  # Excludes EL10, Fedora (all versions), and Debian 12/13: none of them
  # package java-11-openjdk anymore.
  - name: EL
    versions:
      - "9"
  - name: Debian
    versions:
      - "11"
  - name: Ubuntu
    versions:
      - all
